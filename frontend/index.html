<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TradeBot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar">
    <h1>TradeBot</h1>
    <span class="status-dot">● Live</span>
</header>

<main class="dashboard">

    <!-- BALANCE -->
    <div class="card balance">
        <h2>Account Balance</h2>
        <p class="balance">₹<span id="balanceAmount">0</span></p>
        <button onclick="loadBalance()">Refresh</button>
    </div>

    <!-- MARKET SCAN -->
    <div class="card scan">
        <h2>Market Scan</h2>

        <select id="strategy">
            <option value="sma">SMA</option>
            <option value="ema">EMA</option>
            <option value="supertrend">Supertrend</option>
        </select>

        <input type="number" id="fast" value="5">
        <input type="number" id="slow" value="10">

        <button onclick="runScan()">Run Scan</button>

        <table id="scanTable">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Price</th>
                    <th>Signal</th>
                    <th>ADX</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ACTIVE TRADES -->
    <div class="card trades">
        <h2>Active Trades</h2>
        <button onclick="loadTrades()">Refresh</button>

        <table id="tradeTable">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Entry</th>
                    <th>Current</th>
                    <th>Qty</th>
                    <th>PnL %</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ORDER -->
    <div class="card order">
        <h2>Place Order</h2>

        <input type="text" id="symbol" placeholder="Symbol">
        <input type="number" id="quantity" placeholder="Quantity">

        <div class="price-row">
            <input type="number" id="minPrice" placeholder="Min Price">
            <input type="number" id="maxPrice" placeholder="Max Price">
        </div>

        <button onclick="placeOrder()">Place Order</button>
        <p id="orderResult"></p>
    </div>

    <div class="card history" style="grid-column: span 3;">
        <h2>Trade History</h2>
        <button onclick="loadHistory()">Refresh History</button>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Entry</th>
                    <th>Exit</th>
                    <th>PnL %</th>
                    <th>Reason</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</main>

<script src="/static/script.js"></script>
</body>
</html>
