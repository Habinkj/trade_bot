<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TradeBot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="topbar">
        <h1>TradeBot</h1>
        <span class="status-dot">● Live</span>
    </header>

    <main class="dashboard">
        <div class="grid">

            <!-- Account Balance Card -->
            <div class="card">
                <h2>Account Balance</h2>
                <p class="balance">₹<span id="balanceAmount">0</span></p>
                <button onclick="loadBalance()">Refresh</button>
            </div>

            <!-- Market Scan Card -->
            <div class="card">
                <h2>🔍 Smart Market Scan</h2>

                <div class="strategy-row">
                    <select id="strategy">
                        <option value="sma">SMA</option>
                        <option value="ema">EMA</option>
                        <option value="supertrend">Supertrend</option>
                    </select>

                    <input type="number" id="fast" placeholder="Fast MA (e.g. 5)" value="5">
                    <input type="number" id="slow" placeholder="Slow MA (e.g. 10)" value="10">
                </div>

                <button onclick="runScan()">Scan Market</button>

                <ul id="scanResults">
                    <li>Run scan to see opportunities</li>
                </ul>
            </div>

            <!-- Active Trades Card -->
            <div class="card">
                <h2>📊 Active Trades (Live)</h2>
                <button onclick="loadTrades()">Refresh</button>

                <ul id="tradeList">
                    <li>No active trades</li>
                </ul>
            </div>

            <!-- Place Order Card -->
            <div class="card">
                <h2>Place Order</h2>

                <input type="text" id="symbol" placeholder="Symbol (e.g. INFY)">
                <input type="number" id="quantity" placeholder="Quantity">

                <input type="hidden" id="side" value="BUY">

                <div class="price-row">
                    <input type="number" id="minPrice" placeholder="Min Buy Price (₹)" />
                    <input type="number" id="maxPrice" placeholder="Max Buy Price (₹)" />
                </div>

                <p class="warning">
                    &#9888; Investment in securities market are subject to market risks. Read all related documents carefully before investing.
                </p>

                <button id="placeOrderBtn" onclick="placeOrder()">
                    Place Order
                </button>

                <p id="orderResult"></p>
            </div>

        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
