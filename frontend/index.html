<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TradeBot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="topbar">
        <h1>TradeBot</h1>
        <span class="status-dot">● Live</span>
    </header>

    <main class="dashboard">

        <!-- Account Balance Card -->
        <div class="card">
            <h2>Account Balance</h2>
            <p class="balance">₹<span id="balanceAmount">0</span></p>
            <button onclick="refreshBalance()">Refresh</button>
        </div>

        <!-- Market Scan Card -->
        <div class="card">
    <h2>Market Scan</h2>

    <select id="strategy">
        <option value="sma_fast">Fast SMA (5/9)</option>
        <option value="sma_mid">Medium SMA (9/21)</option>
        <option value="sma_slow">Triple SMA (5/13/34)</option>
    </select>

    <button onclick="runScan()">Run Scan</button>

    <ul id="scanResults"></ul>
</div>

        <!-- Place Order Card -->
        <div class="card">
            <h2>Place Order</h2>

            <input type="text" id="symbol" placeholder="Symbol (e.g. INFY)">
            <input type="number" id="quantity" placeholder="Quantity">

            <input type="hidden" id="side" value="BUY">
<p>Orders are BUY only. Exit handled by Trailing Stop Loss.</p>

            <button onclick="placeOrder()">Place Order</button>
            <p id="orderResult" class="order-result"></p>
        </div>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
