<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TradeBot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="topbar">
        <h1>TradeBot</h1>
        <span class="status-dot">● Live</span>
    </header>

    <main class="dashboard">

        <!-- Account Balance Card -->
        <div class="card">
            <h2>Account Balance</h2>
            <p class="balance">₹<span id="balanceAmount">0</span></p>
        <button onclick="loadBalance()">Refresh</button>
        </div>

        <!-- Market Scan Card -->
        <div class="card">
    <h2>Market Scan</h2>

   <select id="strategy">
    <option value="sma_5_10">SMA Crossover (5,10)</option>
    <option value="sma_9_21">SMA Crossover (9,21)</option>
    <option value="sma_15_20">SMA Crossover (15,20)</option>
    <option value="ema_cross">EMA Crossover (9,21)</option>
</select>

    <button onclick="runScan()">Run Scan</button>

    <ul id="scanResults"></ul>
</div>

        <!-- Place Order Card -->
        <div class="card">
            <h2>Place Order</h2>

            <input type="text" id="symbol" placeholder="Symbol (e.g. INFY)">
            <input type="number" id="quantity" placeholder="Quantity">

            <input type="hidden" id="side" value="BUY">
            <div class="price-row">
  <input
    type="number"
    id="minPrice"
    placeholder="Min Buy Price (₹)"
  />

  <input
    type="number"
    id="maxPrice"
    placeholder="Max Buy Price (₹)"
  />
</div>
<p class="warning">&#9888;Investment in securities market are subject to market risks. Read all the related documents carefully before investing</p>

        <button
            id="placeOrderBtn"
            onclick="placeOrder()">
            Place Order
        </button>

<p id="orderResult"></p>
            
        </div>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
